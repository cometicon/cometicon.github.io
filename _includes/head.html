{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Controls how much URL info is leaked in the Referer header on outbound
     navigations and subresources. Does not affect umami: its script reads
     document.referrer in JS and sends it in the request body, not the header. -->
<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- Resolve the analytics origin's DNS early; the script itself is deferred and non-critical -->
<link rel="dns-prefetch" href="https://u.olicorne.org">

<!-- Speculation Rules: prefetch same-origin pages on hover/pointerdown so
     navigation feels instant. Ignored by browsers that don't support it. -->
<script type="speculationrules">
{
  "prefetch": [
    {
      "where": {
        "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/files/*" } },
          { "not": { "href_matches": "/assets/*" } }
        ]
      },
      "eagerness": "moderate"
    }
  ]
}
</script>

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
